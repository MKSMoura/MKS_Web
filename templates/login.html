<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <title>REPRESENTA | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --neon-sky: #38bdf8; --deep-space: #020617; }
    html, body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    input:-webkit-autofill, input:-webkit-autofill:focus { -webkit-box-shadow: 0 0 0 1000px #020617 inset !important; -webkit-text-fill-color: #f8fafc !important; }
  </style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">

  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-sky-900/20 blur-[120px] rounded-full -z-10"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-indigo-900/20 blur-[100px] rounded-full -z-10"></div>

  <div class="glass rounded-[2.5rem] p-10 w-full" style="max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:40px;">
      <div style="width:60px;height:60px;background:#38bdf8;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 30px rgba(56,189,248,0.3);">
        <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h1 class="font-orbitron font-bold text-2xl text-sky-400 tracking-tighter">REPRESENTA</h1>
      <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-1">MKSys · Acesso ao Sistema</p>
    </div>

    {% if request.args.get('timeout') %}
    <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);color:#fbbf24;border-radius:12px;padding:12px 16px;font-size:.8rem;font-weight:600;margin-bottom:20px;text-align:center;">
      ⏱ Sessão encerrada por inatividade. Faça login novamente.
    </div>
    {% elif erro %}
    <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;border-radius:12px;padding:12px 16px;font-size:.8rem;font-weight:600;margin-bottom:20px;text-align:center;">
      {{ erro }}
    </div>
    {% endif %}

    <form method="post" style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;">Login</label>
        <input type="text" name="login" autocomplete="username" autofocus
               placeholder="seu.login"
               style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#f8fafc;font-family:inherit;font-size:.9rem;padding:14px 18px;outline:none;transition:border-color .2s;"
               onfocus="this.style.borderColor='rgba(56,189,248,0.5)'"
               onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;">Senha</label>
        <input type="password" name="senha" autocomplete="current-password"
               placeholder="••••••••"
               style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#f8fafc;font-family:inherit;font-size:.9rem;padding:14px 18px;outline:none;transition:border-color .2s;"
               onfocus="this.style.borderColor='rgba(56,189,248,0.5)'"
               onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
      </div>
      <button type="submit"
              style="margin-top:8px;background:#38bdf8;color:white;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .2s;box-shadow:0 0 25px rgba(56,189,248,0.2);"
              onmouseover="this.style.background='#7dd3fc'"
              onmouseout="this.style.background='#38bdf8'">
        Entrar →
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:10px;color:#334155;">
      Padrão: <span style="color:#38bdf8;font-family:monospace;">admin / admin123</span>
    </p>
  </div>
</body>
</html>
